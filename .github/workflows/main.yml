name: Generare automata video YouTube

# Orele cron sunt in UTC. Bucuresti = UTC+3 vara (EEST) / UTC+2 iarna (EET).
# Folosim offset-ul de vara (UTC+3); iarna, postarile vor fi cu o ora mai
# tarziu fata de orele 08:00/12:00/16:00/21:00 dorite (limitare cunoscuta a
# cron-ului GitHub Actions, care nu se ajusteaza automat la ora de iarna/vara).
on:
  schedule:
    - cron: "0 5 * * *"   # 08:00 Bucuresti -> short
    - cron: "0 9 * * *"   # 12:00 Bucuresti -> short
    - cron: "0 10 * * *"  # 13:00 Bucuresti -> TOP 5 (~10 min)
    - cron: "0 13 * * *"  # 16:00 Bucuresti -> short
    - cron: "0 18 * * *"  # 21:00 Bucuresti -> long
  workflow_dispatch: {}    # permite rulare manuala din tab-ul "Actions" pe GitHub

jobs:
  genereaza-video:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # margine pentru video-urile lungi (TOP 5 ~10 min, long ~15-20 min)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependintele Python
        run: pip install -r requirements.txt

      - name: Determina tipul de video pe baza orei curente (UTC)
        id: slot
        run: |
          ora=$(date -u +%H:%M)
          case "$ora" in
            05:*) echo "tip=short" >> "$GITHUB_OUTPUT"; echo "ora=08:00" >> "$GITHUB_OUTPUT" ;;
            09:*) echo "tip=short" >> "$GITHUB_OUTPUT"; echo "ora=12:00" >> "$GITHUB_OUTPUT" ;;
            10:*) echo "tip=top5"  >> "$GITHUB_OUTPUT"; echo "ora=13:00" >> "$GITHUB_OUTPUT" ;;
            13:*) echo "tip=short" >> "$GITHUB_OUTPUT"; echo "ora=16:00" >> "$GITHUB_OUTPUT" ;;
            18:*) echo "tip=long"  >> "$GITHUB_OUTPUT"; echo "ora=21:00" >> "$GITHUB_OUTPUT" ;;
            *)    echo "tip=short" >> "$GITHUB_OUTPUT"; echo "ora=manual" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Genereaza si posteaza video-ul
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python main.py --tip "${{ steps.slot.outputs.tip }}" --ora "${{ steps.slot.outputs.ora }}"
